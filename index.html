<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Flight Simulator</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script>
    // Scene, Camera, Renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Plane (cube)
    const geometry = new THREE.BoxGeometry(1, 0.5, 2);
    const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    // Controls
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    window.addEventListener("keydown", (e) => {
      if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
    });

    window.addEventListener("keyup", (e) => {
      if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);

      // Controls
      if (keys.ArrowUp) plane.rotation.x -= 0.01;
      if (keys.ArrowDown) plane.rotation.x += 0.01;
      if (keys.ArrowLeft) plane.rotation.y += 0.01;
      if (keys.ArrowRight) plane.rotation.y -= 0.01;

      // Move forward
      plane.translateZ(-0.1);

      // Camera follows
      camera.position.copy(plane.position).add(new THREE.Vector3(0, 2, 5));
      camera.lookAt(plane.position);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
