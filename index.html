<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SUJVERSE</title>
  <link rel="icon" type="image/png" href="image_2025-06-06_224509338-removebg-preview.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    image_2025-06-06_224509338-removebg-preview.png {
  max-width: 100px;
  height: auto;
  margin-bottom: 1rem;
  align-items: center;
  display: block;
    }
    body {
      font-family: 'Exo 2', sans-serif;
      margin: 100;
      background: radial-gradient(circle at center, #13132b 0%, #0a0a1a 70%);
      color: #0071bc;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('ddc3f52b-9f0d-4059-818e-35ea9ad58ce8.png') no-repeat center center / cover;
      opacity: 0.08;
      z-index: 0;
    }

    h1, h2, p {
      margin: 0;
    }

    .glow-text {
      text-shadow: 0 0 10px rgba(100, 150, 255, 0.8);
      animation: fadeInUp 2s ease-out, pulseGlow 3s ease-in-out infinite;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 5; transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0%, 100% { text-shadow: 0 0 10px rgba(100, 150, 255, 0.8), 0 0 20px rgba(100, 150, 255, 0.6); }
      50% { text-shadow: 0 0 15px rgba(100, 150, 255, 1), 0 0 30px rgba(100, 150, 255, 0.8); }
    }

    .container {
      min-height: 0vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper img {
      max-width: 220px;
      filter: drop-shadow(0 0 20px rgba(108, 184, 255, 0.6));
      animation: fadeIn 3s ease-in-out;
      margin-bottom: 15px;
    }

    .title {
      font-size: 10rem;
      font-weight: 700;
      color: white;
      text-align: center;
    }

    @media (min-width: 768px) {
      .title {
        font-size: 9rem;
      }
    }

    .subtitle {
      font-size: 2.25rem;
      color: #add8ff;
      margin-top: 1.5rem;
      text-align: center;
    }

    .countdown-box {
      background: linear-gradient(135deg, rgba(0, 113, 188, 0.4), rgba(0, 113, 188, 0.2));
      border: 1px solid rgba(108, 184, 255, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      box-shadow: 0 0 30px rgba(108, 184, 255, 0.2);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .countdown-box:hover {
      transform: scale(1.03);
    }

    .countdown-segment {
      min-width: 100px;
    }

    .countdown-value {
      font-size: 2rem;
      font-weight: bold;
      color: #6cb8ff;
    }

    .countdown-label {
      font-size: 1rem;
      color: #ccc;
    }

    footer {
      text-align: center;
      padding: 0.1rem;
      font-size: 1rem;
      color: white;
    }

    footer a {
      color: #0071bc;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background-color: rgba(100, 150, 255, 0.4);
      border-radius: 70%;
      pointer-events: none;
    }
  </style>
</head>
<body>
    <img src="image_2025-06-06_224509338-removebg-preview.png"/>
  </div>

  <div id="particles"></div>

  <div class="container">
    <h2 class="title glow-text">SUJVERSE</h2>
    <h3 class="subtitle">Systems Calibrating......</h3>
    <h2>Launching October 9, 2025</h2>

    <div class="countdown-box">
      <div class="countdown-segment">
        <div class="countdown-value" id="days">00</div>
        <div class="countdown-label">Days</div>
      </div>
      <div class="countdown-segment">
        <div class="countdown-value" id="hours">00</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-segment">
        <div class="countdown-value" id="minutes">00</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-segment">
        <div class="countdown-value" id="seconds">00</div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>
  </div>

  <script>
    function updateCountdown() {
      const launchDate = new Date("October 9, 2025 00:00:00").getTime();
      const now = new Date().getTime();
      const distance = launchDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").textContent = String(days).padStart(2, '0');
      document.getElementById("hours").textContent = String(hours).padStart(2, '0');
      document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
      document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');

      if (distance < 0) {
        clearInterval(countdownInterval);
        document.querySelectorAll(".countdown-value").forEach(el => el.textContent = "00");
      }
    }

    const countdownInterval = setInterval(updateCountdown, 1000);
    updateCountdown();

    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = window.innerWidth < 768 ? 30 : 80;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const size = Math.random() * 4 + 2;
        const posX = Math.random() * window.innerWidth;
        const posY = Math.random() * window.innerHeight;
        const opacity = Math.random() * 0.5 + 0.2;
        const duration = Math.random() * 10 + 5;
        const delay = Math.random() * 5;

        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${posX}px`;
        particle.style.top = `${posY}px`;
        particle.style.opacity = opacity;
        particle.style.animation = `float ${duration}s linear ${delay}s infinite`;

        container.appendChild(particle);
      }

      const style = document.createElement('style');
      style.textContent = `
        @keyframes float {
          0% { transform: translateY(0) translateX(0); }
          50% { transform: translateY(-100px) translateX(50px); }
          100% { transform: translateY(0) translateX(0); }
        }
      `;
      document.head.appendChild(style);
    }

    window.addEventListener('load', createParticles);
    window.addEventListener('resize', () => {
      document.getElementById('particles').innerHTML = '';
      createParticles();
    });
  </script>
</body>
</html>
